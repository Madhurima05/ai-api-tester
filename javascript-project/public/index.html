<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI API Tester</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 24px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 20px 24px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #1D9E75; }
    .header h1 { font-size: 20px; font-weight: 500; flex: 1; }
    .badge { font-size: 12px; background: #E6F1FB; color: #185FA5; padding: 3px 10px; border-radius: 12px; }
    .card { background: white; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 20px 24px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 8px; margin-top: 8px; }
    input[type=text] { flex: 1; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #ccc; font-size: 14px; outline: none; }
    input[type=text]:focus { border-color: #378ADD; }
    button { padding: 10px 24px; border-radius: 8px; border: none; background: #185FA5; color: white; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #0C447C; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .metric { background: #f5f5f0; border-radius: 8px; padding: 14px; text-align: center; }
    .metric-label { font-size: 13px; color: #666; margin-bottom: 4px; }
    .metric-value { font-size: 24px; font-weight: 500; }
    .pass-color { color: #0F6E56; }
    .fail-color { color: #993C1D; }
    .result-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; }
    .result-pass { background: #E1F5EE; }
    .result-fail { background: #FAECE7; }
    .badge-pass { font-size: 12px; font-weight: 600; color: #0F6E56; min-width: 40px; }
    .badge-fail { font-size: 12px; font-weight: 600; color: #993C1D; min-width: 40px; }
    .result-name { font-size: 13px; color: #1a1a1a; }
    .ai-box { background: #EEEDFE; border-radius: 8px; padding: 14px 16px; margin-top: 12px; font-size: 13px; color: #3C3489; line-height: 1.6; }
    .section-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .hidden { display: none; }
    .loading { text-align: center; padding: 24px; color: #666; font-size: 14px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ccc; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="dot"></div>
      <h1>AI API Tester</h1>
      <span class="badge">powered by Groq AI</span>
    </div>

    <div class="card">
      <label style="font-size:13px;color:#666">API Base URL</label>
      <div class="input-row">
        <input type="text" id="apiUrl" value="https://jsonplaceholder.typicode.com" placeholder="Enter API URL"/>
        <button id="runBtn" onclick="runTests()">Run Tests</button>
      </div>
    </div>

    <div id="loading" class="card hidden">
      <div class="loading"><span class="spinner"></span>Running tests and analyzing with AI...</div>
    </div>

    <div id="results" class="hidden">
      <div class="metrics">
        <div class="metric"><div class="metric-label">Total tests</div><div class="metric-value" id="total">0</div></div>
        <div class="metric"><div class="metric-label">Passed</div><div class="metric-value pass-color" id="passed">0</div></div>
        <div class="metric"><div class="metric-label">Failed</div><div class="metric-value fail-color" id="failed">0</div></div>
        <div class="metric"><div class="metric-label">Pass rate</div><div class="metric-value" id="rate">0%</div></div>
      </div>

      <div class="card">
        <div class="section-title">Test results</div>
        <div id="testList"></div>
        <div class="section-title" style="margin-top:16px">AI analysis</div>
        <div class="ai-box" id="aiAnalysis"></div>
      </div>
    </div>
  </div>

  <script>
    async function runTests() {
      const url = document.getElementById('apiUrl').value;
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.textContent = 'Running...';
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');

      try {
        const response = await fetch('/run-tests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await response.json();

        document.getElementById('total').textContent = data.results.length;
        document.getElementById('passed').textContent = data.passed;
        document.getElementById('failed').textContent = data.failed;
        document.getElementById('rate').textContent = Math.round((data.passed / data.results.length) * 100) + '%';

        const list = document.getElementById('testList');
        list.innerHTML = data.results.map(r => `
          <div class="result-item ${r.status === 'PASS' ? 'result-pass' : 'result-fail'}">
            <span class="${r.status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${r.status}</span>
            <span class="result-name">${r.name}${r.error ? ' — ' + r.error : ''}</span>
          </div>
        `).join('');

        document.getElementById('aiAnalysis').textContent = data.aiAnalysis;
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
      } catch (error) {
        alert('Error: ' + error.message);
      }

      btn.disabled = false;
      btn.textContent = 'Run Tests';
    }
  </script>
</body>
</html>
